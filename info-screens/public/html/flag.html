<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Telemetry Flag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .back-link {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 9999px;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            font-style: normal;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            opacity: 0.5;
        }
        .back-link:hover {
            opacity: 1;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
        }
        :root {
            --color-dark: #0f0f0f;
            --color-green: #00ff41;
            --color-yellow: #ffea00;
            --color-red: #ff003c;
            --color-white: #ffffff;
            --transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--color-dark);
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.5s ease;
            color: white;
            position: relative;
        }

        /* --- Background Effects --- */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- Central HUD --- */
        .hud-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
        }

        .status-wrapper {
            display: none;
            /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .icon-box {
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
        }

        .icon-box svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
            filter: drop-shadow(0 0 20px currentColor);
        }

        .status-text {
            font-size: clamp(3rem, 8vw, 6rem);
            font-style: italic;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .sub-text {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 10px;
            font-weight: 800;
        }

        /* --- Specific State Styles --- */

        /* 1. NO FLAG / WAITING */
        body:not([class*="flag-"]) .state-waiting {
            display: flex;
        }

        body:not([class*="flag-"]) {
            background-color: #1a1a1a;
        }

        .state-waiting {
            color: #555;
        }

        /* 2. GREEN / SAFE */
        body.flag-safe {
            background-color: #003300;
        }

        body.flag-safe .state-safe {
            display: flex;
            color: var(--color-green);
        }

        body.flag-safe .bg-pattern {
            opacity: 0.3;
        }

        /* 3. YELLOW / HAZARD */
        body.flag-hazard {
            background-color: #332b00;
        }

        body.flag-hazard .state-hazard {
            display: flex;
            color: var(--color-yellow);
        }

        body.flag-hazard .icon-box {
            animation: pulse 1s infinite;
        }

        /* 4. RED / DANGER */
        body.flag-danger {
            background-color: #330000;
        }

        body.flag-danger .state-danger {
            display: flex;
            color: var(--color-red);
        }

        body.flag-danger {
            animation: flashRed 0.8s infinite;
        }

        /* 5. CHECKERED / FINISH */
        body.flag-finish {
            background-color: #111;
        }

        /* Custom checkered background for finish only */
        body.flag-finish::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-conic-gradient(#000 0deg 90deg, #fff 90deg 180deg);
            background-size: 100px 100px;
            opacity: 0.15;
            animation: drift 20s linear infinite;
            z-index: 0;
        }

        body.flag-finish .state-finish {
            display: flex;
            color: var(--color-white);
        }

        body.flag-finish .icon-box {
            animation: wave 2s ease-in-out infinite;
        }

        /* --- Keyframes --- */
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes flashRed {
            0% {
                background-color: #330000;
            }

            50% {
                background-color: #590000;
            }

            100% {
                background-color: #330000;
            }
        }

        @keyframes drift {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes wave {

            0%,
            100% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }
        }
    </style>
</head>

<body>

    <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
    <div class="bg-pattern"></div>
    <div class="vignette"></div>

    <div class="hud-container">

        <div class="status-wrapper state-waiting">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" />
                </svg>
            </div>
            <div class="status-text">STANDBY</div>
            <div class="sub-text">Awaiting Race Data</div>
        </div>

        <div class="status-wrapper state-safe">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L1 21h22L12 2zm0 3.45l8.27 14.55H3.73L12 5.45zM11 16h2v2h-2zm0-6h2v4h-2z"
                        style="display:none;" />
                    <path
                        d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z" />
                </svg>
            </div>
            <div class="status-text">GREEN FLAG</div>
            <div class="sub-text">Track Clear / Go</div>
        </div>

        <div class="status-wrapper state-hazard">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
                </svg>
            </div>
            <div class="status-text">CAUTION</div>
            <div class="sub-text">Sector Hazard / Slow Down</div>
        </div>

        <div class="status-wrapper state-danger">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z" />
                </svg>
            </div>
            <div class="status-text">RED FLAG</div>
            <div class="sub-text">Session Stopped / Return to Pits</div>
        </div>

        <div class="status-wrapper state-finish">
            <div class="icon-box">
                <svg viewBox="0 0 24 24">
                    <path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z" />
                </svg>
            </div>
            <div class="status-text">FINISH</div>
            <div class="sub-text">Race Complete</div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRaceId = null;

        const flagConfig = {
            green: { class: 'flag-safe' },
            safe: { class: 'flag-safe' },
            yellow: { class: 'flag-hazard' },
            hazard: { class: 'flag-hazard' },
            red: { class: 'flag-danger' },
            danger: { class: 'flag-danger' },
            checkered: { class: 'flag-finish' },
            finish: { class: 'flag-finish' }
        };

        function updateFlag(flag) {
            // Default to 'danger' (Red) if no flag provided or race is null (Standby = Red)
            if (!flag) {
                flag = 'danger';
            }

            const normalizedFlag = flag.toLowerCase();
            const config = flagConfig[normalizedFlag];

            if (config) {
                document.body.className = config.class;
            } else {
                console.warn('Unknown flag value:', flag);
                // Fallback to danger
                document.body.className = flagConfig['danger'].class;
            }
        }

        function findBestRace(races) {
            if (!races || !races.length) return null;

            // Filter by states
            const started = races.filter(r => r.state === 'STARTED' || r.state === 'ACTIVE');
            const safe = races.filter(r => r.state === 'SAFE_TO_START');
            const pending = races.filter(r => r.state === 'PENDING');
            const finished = races.filter(r => r.state === 'FINISHED');

            // Priority 1: STARTED (Active race) - Take the most recent one (end of array)
            if (started.length > 0) return started[started.length - 1];

            // Priority 2: SAFE_TO_START (About to start)
            if (safe.length > 0) return safe[safe.length - 1];

            // Priority 3: PENDING (Next in queue)
            if (pending.length > 0) return pending[pending.length - 1];

            // Priority 4: FINISHED (Last race result) - Take the most recently finished
            if (finished.length > 0) return finished[finished.length - 1];

            // Fallback: Just the last race in the list
            return races[races.length - 1];
        }

        function processRaces(races) {
            const bestRace = findBestRace(races);

            if (bestRace) {
                // Check if we need to switch races or update the current one
                if (currentRaceId !== bestRace.id) {
                    console.log(`Switching from race ${currentRaceId} to ${bestRace.id} (${bestRace.state})`);
                    currentRaceId = bestRace.id;
                }
                // Always update flag to ensure sync
                updateFlag(bestRace.flag);
            } else {
                console.log('No relevant races found');
                // Optional: reset to standby if no races exist
                if (currentRaceId) {
                    currentRaceId = null;
                    updateFlag(null);
                }
            }
        }

        function loadCurrentRace() {
            socket.emit('get-all-races', {}, (response) => {
                if (response.success && response.races) {
                    processRaces(response.races);
                }
            });
        }

        socket.on('races-update', (races) => {
            processRaces(races);
        });

        socket.on('flag-update', (data) => {
            // If the update is for our current race, apply it immediately
            if (data.raceId === currentRaceId) {
                updateFlag(data.flag);
            }
            // If it's for a different race, we might not care, 
            // OR it might mean that race has become relevant?
            // Rely on 'races-update' for switching races.
        });

        // Initial load
        loadCurrentRace();
    </script>
</body>

</html>
